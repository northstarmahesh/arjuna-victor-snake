<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjuna & Victor's Snake Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif;color:#fff;padding:20px;}
h1{font-size:36px;margin-bottom:12px;letter-spacing:-1px;}
h1 span{color:#E07A5F;}
.top{display:flex;gap:40px;margin-bottom:16px;align-items:flex-start;}
.scoreboard{background:#161616;border:1px solid #333;border-radius:12px;padding:16px 24px;min-width:180px;}
.scoreboard h3{color:#E07A5F;font-size:13px;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;}
.sb-row{display:flex;justify-content:space-between;padding:4px 0;font-size:15px;border-bottom:1px solid #222;}
.sb-row:last-child{border:none;}
.sb-name{color:#ccc;}.sb-score{color:#E07A5F;font-weight:700;}
.sb-active{color:#fff;font-weight:700;}
.game-info{display:flex;flex-direction:column;align-items:center;gap:8px;}
.current{font-size:20px;color:#888;}
.current b{color:#fff;font-size:28px;}
.levels{display:flex;gap:8px;margin-bottom:8px;}
.lvl{padding:8px 18px;border-radius:100px;border:2px solid #333;background:transparent;color:#888;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.lvl:hover{border-color:#666;color:#fff;}
.lvl.on{border-color:#E07A5F;color:#E07A5F;background:rgba(224,122,95,.1);}
.player-select{display:flex;gap:8px;margin-bottom:8px;}
.ps{padding:6px 16px;border-radius:100px;border:2px solid #333;background:transparent;color:#888;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.ps:hover{border-color:#666;color:#fff;}
.ps.on{border-color:#58B09C;color:#58B09C;background:rgba(88,176,156,.1);}
canvas{border:2px solid #222;border-radius:8px;background:#111;margin-top:8px;}
.msg{margin-top:12px;font-size:13px;color:#444;}
.music-btn{position:fixed;top:16px;right:16px;background:#222;border:1px solid #333;color:#888;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;}
.music-btn:hover{color:#fff;border-color:#555;}
</style>
</head>
<body>
<h1>Arjuna <span>&</span> Victor</h1>

<div class="player-select">
  <button class="ps on" onclick="setPlayer('Arjuna')">Arjuna</button>
  <button class="ps" onclick="setPlayer('Victor')">Victor</button>
</div>

<div class="levels">
  <button class="lvl" onclick="setLevel(0)">Beginner</button>
  <button class="lvl on" onclick="setLevel(1)">Intermediate</button>
  <button class="lvl" onclick="setLevel(2)">Advanced</button>
</div>

<div class="top">
  <div class="scoreboard">
    <h3>Scoreboard</h3>
    <div class="sb-row"><span class="sb-name">Arjuna</span><span class="sb-score" id="sa">0</span></div>
    <div class="sb-row"><span class="sb-name">Victor</span><span class="sb-score" id="sv">0</span></div>
  </div>
  <div class="game-info">
    <div class="current">Playing as: <b id="cp">Arjuna</b></div>
    <div class="current">Score: <b id="sc">0</b></div>
    <div class="current" style="font-size:14px;">Level: <b id="cl" style="font-size:16px;">Intermediate</b></div>
  </div>
</div>

<canvas id="c" width="400" height="400"></canvas>
<p class="msg">Arrow keys / WASD to play &bull; Space to restart &bull; 1-2-3 to change level</p>
<button class="music-btn" onclick="toggleMusic()">🔇 Music</button>

<script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),sz=20,cols=c.width/sz,rows=c.height/sz;
let snake,dir,food,score,alive,interval,player='Arjuna',level=1;
const speeds=[140,100,60];
const levelNames=['Beginner','Intermediate','Advanced'];
const levelColors=['#58B09C','#E07A5F','#D93030'];
const scores={Arjuna:0,Victor:0};

// Music via Web Audio API
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
let musicOn=false,musicNodes=[];

function createMusic(){
  stopMusic();
  const bpm=level===0?100:level===1?130:160;
  const beatLen=60/bpm;
  const notes=[261.6,329.6,392,523.3,392,329.6,261.6,196,261.6,329.6,392,523.3,659.3,523.3,392,329.6];
  const now=audioCtx.currentTime;
  notes.forEach((freq,i)=>{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type=level===0?'sine':level===1?'triangle':'sawtooth';
    osc.frequency.value=freq;
    gain.gain.setValueAtTime(0,now+i*beatLen);
    gain.gain.linearRampToValueAtTime(0.06,now+i*beatLen+0.05);
    gain.gain.linearRampToValueAtTime(0.04,now+i*beatLen+beatLen*0.8);
    gain.gain.linearRampToValueAtTime(0,now+i*beatLen+beatLen);
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.start(now+i*beatLen);
    osc.stop(now+i*beatLen+beatLen);
    musicNodes.push(osc);
  });
  const totalLen=notes.length*beatLen*1000;
  if(musicOn)setTimeout(()=>{if(musicOn)createMusic();},totalLen);
}

function stopMusic(){musicNodes.forEach(n=>{try{n.stop();}catch(e){}});musicNodes=[];}

function toggleMusic(){
  musicOn=!musicOn;
  document.querySelector('.music-btn').textContent=musicOn?'🔊 Music':'🔇 Music';
  if(musicOn){audioCtx.resume();createMusic();}else stopMusic();
}

function playEatSound(){
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.value=880;
  g.gain.setValueAtTime(0.1,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+0.15);
}

function playDeathSound(){
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='square';o.frequency.value=200;
  o.frequency.linearRampToValueAtTime(50,audioCtx.currentTime+0.4);
  g.gain.setValueAtTime(0.08,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+0.4);
}

function setPlayer(p){
  player=p;
  document.getElementById('cp').textContent=p;
  document.querySelectorAll('.ps').forEach(b=>b.classList.toggle('on',b.textContent===p));
  init();
}

function setLevel(l){
  level=l;
  document.getElementById('cl').textContent=levelNames[l];
  document.querySelectorAll('.lvl').forEach((b,i)=>b.classList.toggle('on',i===l));
  if(musicOn){stopMusic();createMusic();}
  init();
}

function init(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};score=0;alive=true;
  document.getElementById('sc').textContent=0;
  placeFood();
  if(interval)clearInterval(interval);
  interval=setInterval(loop,speeds[level]);
}

function placeFood(){
  do{food={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function loop(){
  if(!alive)return;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=cols||head.y<0||head.y>=rows||snake.some(s=>s.x===head.x&&s.y===head.y)){
    alive=false;
    playDeathSound();
    // Add score with level multiplier
    const mult=level+1;
    const finalScore=score*mult;
    scores[player]+=finalScore;
    document.getElementById('sa').textContent=scores.Arjuna;
    document.getElementById('sv').textContent=scores.Victor;
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle=levelColors[level];ctx.font='bold 28px sans-serif';ctx.textAlign='center';
    ctx.fillText('Game Over!',c.width/2,c.height/2-30);
    ctx.fillStyle='#fff';ctx.font='bold 20px sans-serif';
    ctx.fillText(`${player}: +${finalScore} pts`,c.width/2,c.height/2+5);
    ctx.fillStyle='#666';ctx.font='14px sans-serif';
    ctx.fillText(`(${score} x${mult} ${levelNames[level]} bonus)`,c.width/2,c.height/2+28);
    ctx.fillText('Space to restart',c.width/2,c.height/2+55);
    return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++;
    document.getElementById('sc').textContent=score;
    playEatSound();
    placeFood();
  } else snake.pop();
  draw();
}

function draw(){
  ctx.fillStyle='#111';ctx.fillRect(0,0,c.width,c.height);
  // grid dots for advanced
  if(level===2){ctx.fillStyle='#191919';for(let x=0;x<cols;x++)for(let y=0;y<rows;y++){ctx.beginPath();ctx.arc(x*sz+sz/2,y*sz+sz/2,1,0,Math.PI*2);ctx.fill();}}
  // food
  ctx.fillStyle=levelColors[level];
  ctx.beginPath();ctx.arc(food.x*sz+sz/2,food.y*sz+sz/2,sz/2-2,0,Math.PI*2);ctx.fill();
  // glow
  ctx.shadowColor=levelColors[level];ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(food.x*sz+sz/2,food.y*sz+sz/2,sz/2-4,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // snake
  snake.forEach((s,i)=>{
    const t=1-i/snake.length*0.6;
    ctx.fillStyle=i===0?'#fff':`rgba(255,255,255,${t})`;
    ctx.beginPath();ctx.roundRect(s.x*sz+1,s.y*sz+1,sz-2,sz-2,i===0?6:4);ctx.fill();
  });
}

document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if((k==='arrowup'||k==='w')&&dir.y!==1)dir={x:0,y:-1};
  else if((k==='arrowdown'||k==='s')&&dir.y!==-1)dir={x:0,y:1};
  else if((k==='arrowleft'||k==='a')&&dir.x!==1)dir={x:-1,y:0};
  else if((k==='arrowright'||k==='d')&&dir.x!==-1)dir={x:1,y:0};
  else if(k===' '&&!alive)init();
  else if(k==='1')setLevel(0);
  else if(k==='2')setLevel(1);
  else if(k==='3')setLevel(2);
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();
});

init();
</script>
</body>
</html>
